<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVerse</title>
    <link rel="stylesheet" href="ss3.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4221/4221484.png" type="image/png">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

    <header class="main-header">

        <h1 class="site-title">
            <span class="logo-mark">◈</span>
            CineVerse
        </h1>

        <div class="header-actions">
            <div class="lightandDArk">
                <span class="icon moon">🌙</span>
                <span class="icon sun">☀️</span>
            </div>
            <button id="showMyWatchlist" class="watchlist-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                My Watchlist
            </button>
            <button id="loginBtn" class="logout-btn login-btn hidden" onclick="window.location.href='login.html'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                Login
            </button>
            <button id="logoutBtn" class="logout-btn hidden">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </button>
        </div>

    </header>

    <div class="searchPar">
        <input type="text" placeholder="Search movies, directors, actors…">
        <button class="search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Search
        </button>
        <button class="filter">
            <svg fill="#fff" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/>
            </svg>
            Filter
        </button>
        <button id="chat-toggle-btn" class="ask-gemini-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 9L20.5 5.5L24 4L20.5 2.5L19 -1L17.5 2.5L14 4L17.5 5.5L19 9ZM11.5 9.5L8.5 2.5L5.5 9.5L-1.5 12.5L5.5 15.5L8.5 22.5L11.5 15.5L18.5 12.5L11.5 9.5ZM19 16L17.5 19.5L14 21L17.5 22.5L19 26L20.5 22.5L24 21L20.5 19.5L19 16Z" fill="currentColor"/>
            </svg>
            Ask Gemini
        </button>
    </div>

    <div id="ai-chat-wrapper">
        <div id="chat-box" class="hidden">
            <div id="chat-header">
                <span class="gemini-title">Gemini</span>
                <button id="close-chat-btn">✕</button>
            </div>
            <div id="chat-content"></div>
            <div id="chat-footer">
                <input type="text" id="ai-input" placeholder="Ask Gemini about movies...">
                <button id="ai-send">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="filter-panel">
        <div class="filter-title">
            Filter Panel <button class="closePanel">✕</button>
        </div>
        <div class="filter-option">
            <label for="filter-year">Year</label>
            <input type="text" id="filter-year" placeholder="e.g., 2023">
        </div>
        <div class="filter-option">
            <label for="filter-genre">Genre</label>
            <input type="text" id="filter-genre" placeholder="e.g., Action">
        </div>
        <div class="filter-option">
            <label for="filter-actor">Actor</label>
            <input type="text" id="filter-actor" placeholder="e.g., Tom Hanks">
        </div>
        <div class="twoButtons">
            <button class="apply-filter-btn">Apply</button>
            <button class="clear-filter-btn">Clear</button>
        </div>
    </div>

    <div class="movieContainerAndReadMore">
        <div class="movies-container"></div>
        <button class="displayMore">Load More</button>
    </div>

    <div class="nothing"></div>

    <div class="overlay"></div>

    <div id="movie-details-modal" class="modal-container">
        <div class="content">
            <button class="x">✕</button>
            <div class="dataDetails">
                <img src="https://m.media-amazon.com/images/M/MV5BNGE0YTVjNzUtNzJjOS00NGNlLTgxMzctZTY4YTE1Y2Y1ZTU4XkEyXkFqcGc@._V1_SX300.jpg" alt="Movie Poster" class="dummy-poster" loading="lazy">
                <div class="details">
                    <h2></h2>
                    <div class="dummy-rating-box"></div>
                    <p class="dummy-plot"></p>
                    <div class="dummy-other-details"></div>
                </div>
            </div>
        </div>
    </div>

    <button class="button">
        <svg viewBox="0 0 384 512" class="svgIcon">
            <path d="M214.6 41.4c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 141.2V448c0 17.7 14.3 32 32 32s32-14.3 32-32V141.2L329.4 246.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-160-160z"/>
        </svg>
    </button>

    <div class="AddingAndREmovungFIlm"></div>

    <script src="ss3.js"></script>
</body>
</html>
